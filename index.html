<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="慢时光的影子">
  <meta property="og:description" content="记录生活里值得留下的片刻">
  <meta property="og:image" content="images/cover.jpg">
  <meta property="og:url" content="https://laoyang0001.github.io/manshiguang/">
  <meta property="og:type" content="website">
  <title>慢时光的影子</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部封面 -->
  <header class="hero">
    <div class="hero-overlay">
      <h1>慢时光的影子</h1>
      <p>影像 · 音乐 · 视频</p>
    </div>
  </header>

  <!-- 导航 -->
  <nav class="nav">
    <a href="#music" class="nav-item active">🎵 音乐</a>
    <a href="#videos" class="nav-item">🎬 视频</a>
    <a href="#photos" class="nav-item">📷 影像</a>
  </nav>

  <main>

    <!-- 音乐区 -->
    <section id="music" class="section">
      <h2 class="section-title">🎵 音乐</h2>
      <div class="music-list">
        
        <div class="music-item">
          <div class="music-info">
            <div class="item-title">歌曲名称</div>
            <div class="music-meta">作词/作曲/演唱 2024</div>
            <details class="lyrics-toggle"><summary>🎤 查看歌词</summary><div class="lyrics-content">歌词内容在这里显示...</div></details>
          </div>
          <div class="music-controls">
            <audio controls preload="none">
              <source src="music/song1.mp3" type="audio/mpeg">
              您的浏览器不支持音频播放
            </audio>
            <div class="share-btn" onclick="shareItem('music/song1.mp3', '歌曲名称', 'music')" title="分享">📤 分享</div>
          </div>
        </div>

        <div class="music-item">
          <div class="music-info">
            <div class="item-title">歌曲名称</div>
            <div class="music-meta">作词/作曲/演唱 2024</div>
            
          </div>
          <div class="music-controls">
            <audio controls preload="none">
              <source src="music/song2.mp3" type="audio/mpeg">
              您的浏览器不支持音频播放
            </audio>
            <div class="share-btn" onclick="shareItem('music/song2.mp3', '歌曲名称', 'music')" title="分享">📤 分享</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 视频区 -->
    <section id="videos" class="section">
      <h2 class="section-title">🎬 视频</h2>
      <div class="video-grid">
        
        <div class="video-card">
          <div class="video-wrap">
            <iframe src="https://player.bilibili.com/player.html?bvid=BV1xx411c7mD" scrolling="no" frameborder="0" allowfullscreen></iframe>
          </div>
          <div class="card-caption">
            <div class="item-title">视频标题</div>
            <div class="item-desc">视频简介或说明...</div>
            <div class="share-btn" onclick="shareItem('https://player.bilibili.com/player.html?bvid=BV1xx411c7mD', '视频标题', 'video')" title="分享">📤 分享</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 图片区 -->
    <section id="photos" class="section">
      <h2 class="section-title">📷 影像</h2>
      <div class="photo-grid">
        
        <div class="photo-card">
          <div class="photo-img-wrap" onclick="openLightbox('images/photo1.jpg', '作品标题', '拍摄地点、时间或创作说明...')">
            <img src="images/photo1.jpg" alt="作品标题" loading="lazy">
            <div class="share-btn" onclick="event.stopPropagation(); shareItem('images/photo1.jpg', '作品标题', 'photo')" title="分享">📤</div>
          </div>
          <div class="card-caption">
            <div class="item-title">作品标题</div>
            <div class="item-desc">拍摄地点、时间或创作说明...</div>
          </div>
        </div>

        <div class="photo-card">
          <div class="photo-img-wrap" onclick="openLightbox('images/photo2.jpg', '作品标题', '拍摄地点、时间或创作说明...')">
            <img src="images/photo2.jpg" alt="作品标题" loading="lazy">
            <div class="share-btn" onclick="event.stopPropagation(); shareItem('images/photo2.jpg', '作品标题', 'photo')" title="分享">📤</div>
          </div>
          <div class="card-caption">
            <div class="item-title">作品标题</div>
            <div class="item-desc">拍摄地点、时间或创作说明...</div>
          </div>
        </div>

        <div class="photo-card">
          <div class="photo-img-wrap" onclick="openLightbox('images/photo3.jpg', '作品标题', '拍摄地点、时间或创作说明...')">
            <img src="images/photo3.jpg" alt="作品标题" loading="lazy">
            <div class="share-btn" onclick="event.stopPropagation(); shareItem('images/photo3.jpg', '作品标题', 'photo')" title="分享">📤</div>
          </div>
          <div class="card-caption">
            <div class="item-title">作品标题</div>
            <div class="item-desc">拍摄地点、时间或创作说明...</div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- 图片灯箱 -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <span class="lightbox-close" onclick="closeLightbox()">×</span>
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox-caption">
        <div id="lightbox-title" class="lightbox-title"></div>
        <div id="lightbox-desc" class="lightbox-desc"></div>
        <div class="lightbox-share" id="lightbox-share-btn"></div>
      </div>
    </div>
  </div>

  <!-- 分享弹窗 -->
  <div id="share-modal" class="lightbox" onclick="closeShareModal()">
    <div class="share-panel" onclick="event.stopPropagation()">
      <div class="share-title">分享到</div>
      <div class="share-icons">
        <div class="share-icon" onclick="shareNative('wechat')">💬<span>微信</span></div>
        <div class="share-icon" onclick="shareNative('douyin')">🎵<span>抖音</span></div>
        <div class="share-icon" onclick="shareNative('weibo')">🔺<span>微博</span></div>
        <div class="share-icon" onclick="shareNative('qq')">🐧<span>QQ</span></div>
        <div class="share-icon" onclick="copyLink()">🔗<span>复制链接</span></div>
      </div>
      <div class="share-close" onclick="closeShareModal()">取消</div>
    </div>
  </div>

  <footer class="footer">
    <p>© 慢时光的影子 · 用心记录每一刻</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
